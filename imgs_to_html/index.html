    <style>
      :root {
        --bg-main: #1a1b26;
        --bg-panel: #24283b;
        --bg-panel-light: #2e344e;
        --border-color: #414868;
        --text-main: #c0caf5;
        --text-secondary: #a9b1d6;
        --text-dark: #565f89;
        --accent-primary: #7aa2f7;
        --accent-primary-hover: #9dacfa;
        --accent-success: #9ece6a;
        --accent-warning: #e0af68;

        --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
        --font-mono: "Fira Code", "Courier New", Courier, monospace;
      }
      
      *, *::before, *::after {
        box-sizing: border-box;
      }

      body {
        font-family: var(--font-sans);
        width: 100%;
        height: 100vh;
        margin: 0;
        background: var(--bg-main);
        color: var(--text-main);
        overflow: hidden;
      }
      
      .global_container {
        padding: 20px;
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      /* --- Typography --- */
      h3 { color: var(--text-main); margin-top: 1em; margin-bottom: 0.5em; }
      h4 { color: var(--text-secondary); margin-top: 0.5em; margin-bottom: 0.5em; }
      small { color: var(--text-dark); }
      a { color: var(--accent-primary); text-decoration: none; transition: color 0.2s ease; }
      a:hover { color: var(--accent-primary-hover); }

      /* --- Control Groups --- */
      .control-group {
        display: flex;
        align-items: center;
        gap: 15px;
        padding: 10px;
        background: var(--bg-panel);
        border-radius: 8px;
        margin-bottom: 10px;
        flex-wrap: wrap;
      }
      
      .control-group-item {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--text-secondary);
      }
      
      /* --- Custom Inputs --- */
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 150px;
        height: 6px;
        background: var(--border-color);
        border-radius: 5px;
        outline: none;
        cursor: pointer;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 16px;
        height: 16px;
        background: var(--accent-primary);
        border-radius: 50%;
        cursor: pointer;
        transition: background 0.2s ease;
      }
      input[type="range"]::-webkit-slider-thumb:hover { background: var(--accent-primary-hover); }
      input[type="range"]::-moz-range-thumb {
        width: 16px;
        height: 16px;
        background: var(--accent-primary);
        border-radius: 50%;
        cursor: pointer;
        border: none;
        transition: background 0.2s ease;
      }
      input[type="range"]::-moz-range-thumb:hover { background: var(--accent-primary-hover); }
      
      input[type="number"] {
        background: var(--bg-main);
        border: 1px solid var(--border-color);
        color: var(--text-main);
        padding: 5px 8px;
        border-radius: 4px;
        width: 70px;
      }

      input[type="checkbox"] {
        display: none;
      }
      input[type="checkbox"] + label {
        position: relative;
        padding-left: 25px;
        cursor: pointer;
        user-select: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      input[type="checkbox"] + label:before {
        content: '';
        position: absolute;
        left: 0;
        top: 2px;
        width: 16px;
        height: 16px;
        border: 2px solid var(--border-color);
        background: var(--bg-main);
        border-radius: 4px;
        transition: all 0.2s ease;
      }
      input[type="checkbox"]:checked + label:before {
        background: var(--accent-primary);
        border-color: var(--accent-primary);
      }
      input[type="checkbox"]:checked + label:after {
        content: '✔';
        position: absolute;
        left: 3px;
        top: 2px;
        font-size: 14px;
        color: var(--bg-main);
      }
      
      /* --- Buttons --- */
      .label_button, button {
        background: transparent;
        border: 1px solid var(--border-color);
        color: var(--text-secondary);
        padding: 6px 15px;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.2s ease;
        font-family: var(--font-sans);
        font-size: 14px;
      }
      .label_button:hover, button:hover {
        background-color: var(--accent-primary);
        border-color: var(--accent-primary);
        color: var(--bg-main);
      }
      
      /* --- Main Layout --- */

        display: flex;
        gap: 20px;
        flex: 1;
        min-height: 0; /* Important for flexbox children with scroll */

        border-radius: 8px;

        background: var(--bg-main);

        border-radius: 8px;

        grid-auto-rows: min-content;

      #thumbs_list div .editable_favorite:hover { opacity: 1; transform: scale(1.2); }
      
      #thumbs_list div img {

        user-select: none;
      }

      .editable_container {

        display: flex;
        gap: 20px;
        border-bottom: 1px solid var(--border-color);

      .editable_pos, .editable_neg, .editable_cfg {

        flex: 1;

        border: 1px solid var(--border-color);
        color: var(--text-main);

      .editable_neg { border-left: 3px solid var(--accent-danger); }
      .editable_cfg { border-left: 3px solid var(--accent-primary); }

      /* --- Utility & State Classes --- */
      .hidden { display: none !important; }
      .unclickable { opacity: 0.5; pointer-events: none; }

      /* --- Modal Window --- */
      .modal_window {
        position: fixed;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        z-index: 1000;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(4px);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      .modal_window .outer_container {
        width: auto;
        max-width: 800px;
        height: auto;
        background: var(--bg-panel);
        border-radius: 12px;
        border: 1px solid var(--border-color);
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        position: relative;
      }

      .modal_window .inner_container {

      .modal_close_button {

        position: absolute;
        right: 10px;
        top: 10px;

      /* --- Scrollbar styling --- */

      ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 5px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--accent-primary); }

    </style>
  </head>

    <script>
        // JAVASCRIPT LOGIC IS 100% PRESERVED
        // ALL IDs AND CLASS NAMES USED BY JS ARE THE SAME
        
        let CROSSFRAME_TRANSITION_ENABLED = true;
        class MP4_Recorder {

          constructor( config = {} ){

            this.fps = config.fps || 30;

            this.width = config.width || 768;
            this.height = config.height || 768;

            this.can = document.getElementById('MP4_Recorder_canvas');
            this.can.width = this.width;
            this.can.height = this.height;
            this.ctx = this.can.getContext('2d');

            this.can2 = document.createElement( 'canvas' );
            this.ctx2 = this.can2.getContext('2d');

            this.videoStream = null;
            this.mediaRecorder = null;

            this.chunks = [];

          }

          init(){
            this.videoStream = this.can.captureStream(60);
            this.mediaRecorder = new MediaRecorder(this.videoStream, { mimeType:  'video/webm;codecs=h264' });
            this.mediaRecorder.width    = this.width;
            this.mediaRecorder.height   = this.height;
            this.mediaRecorder.ondataavailable = (e) => { 
              this.addData(e.data); 
            }
            this.mediaRecorder.onstop = function(e) {

            }
          }

          start(){
            this.init();
            this.mediaRecorder.start();
          }

          stop(){
            this.mediaRecorder.stop();
          }

          addData( data ){
            this.chunks.push(data);
          }

          finally(){
            this.stop();
            return new Promise( ( resolve, reject ) => {
              setTimeout( () => {
                const blob = new Blob( this.chunks, {  
                  // 'type': 'video/webm;codecs=h264'
                  type: 'video/mp4'
                 });
                resolve( blob );
              }, 100 );
            });
          }

          calculateSizeProps( img ){

            const aspect = ( img.width > img.height ) ?  this.width / img.width : this.height / img.height;
            const imgW = img.width * aspect;
            const imgH = img.height * aspect;
            const imgX = ( this.width / 2 ) - ( imgW / 2 );
            const imgY = ( this.height / 2 ) - ( imgH / 2 );

            return {
              aspect,
              x: imgX,
              y: imgY,
              w: imgW,
              h: imgH,
            }

          }

          async addFrame( img, prevImage ){

            const minimalFrmaeLength = 17;
            const currentFrameLength = 1000 / this.fps;
            let transitionCount = 0;

            if( CROSSFRAME_TRANSITION_ENABLED && prevImage ){
              transitionCount = Math.floor( currentFrameLength / minimalFrmaeLength );
            }


            if( !transitionCount ){
              
              const imgOpts = this.calculateSizeProps( img );
              this.ctx.fill = '#000000';
              this.ctx.fillRect( 0, 0, this.width, this.height );
              this.ctx.drawImage( img,
                  0, 0, img.width, img.height,
                  imgOpts.x, imgOpts.y, imgOpts.w, imgOpts.h,
              );

            } else {

              const imgPrevOpts = this.calculateSizeProps( prevImage );
              const imgOpts = this.calculateSizeProps( img );

              this.can2.width = this.can.width;
              this.can2.height = this.can.height;

              for( let i = 0; i < transitionCount; i++ ){

                const _alpha = i / transitionCount;
                
                await new Promise( ( resolve, reject ) => {

                  this.ctx.globalAlpha = 1.0;
                  this.ctx.fill = '#000000';
                  this.ctx.fillRect( 0, 0, this.width, this.height );

          $$('video_recorder_switcher').addEventListener( 'change', () => {
            RECORDER_ACTIVE = !!$$('video_recorder_switcher').checked;
            if( RECORDER_ACTIVE ){
              $$('video_recorder_menu').classList.remove('hidden');
            } else {
              $$('video_recorder_menu').classList.add('hidden');
            }
          } );

          $$('convert_video').addEventListener( 'click', async () => {
            if( RECORDER_ACTIVE ){

              const _width = parseInt( $$('record_video_width').value );
              const _height = parseInt( $$('record_video_height').value );
              const _fps = parseFloat( $$('record_video_fps').value );

              const nextRecorder = new MP4_Recorder( {
                width: _width,
                height: _height,
                fps: _fps
              } );
              if( nextRecorder ){
                nextRecorder.start();
                ProcessingModalWindow.init( FRAMES_BUFFER_ARRAY.length, { videorecorder: true } );
                let processed = 0;
                let previouseImage = null;
                for( const nextFrameDataURL of FRAMES_BUFFER_ARRAY ){
                  await new Promise( ( next, reject ) => {
                    const _img = new Image();
                    _img.onload = () => { 
                      nextRecorder.addFrame( _img, previouseImage );
                      setTimeout( () => {
                        processed++;
                        ProcessingModalWindow.addNext( processed, FRAMES_BUFFER_ARRAY[ processed - 1 ] );
                        previouseImage = _img;
                        next();
                      }, 1000 / _fps );
                      }
                    _img.src = nextFrameDataURL;
                  } );
                }
                ProcessingModalWindow.finish();
                nextRecorder.finally().then( ( blob ) => {
                  VIDEO_BLOB = blob;
                  const fr = new FileReader();
                  fr.onload = () => {
                    VIDEO_SOURCE = fr.result;
                  };
                  fr.readAsDataURL( blob );
                  $$('get_result_gallery_mp4').style.display = 'inline-block';
                });
              }
            }
          } );

          const VIDEO_VIEWER_TEMPLATE = `
            <html>
              <head>
                <meta name="viewport" content="width=device-width">
              </head>
              <body>
                <video controls="" autoplay="" name="media">
                  <source src="__SOURCE_DATAURL__" type="video/mp4">
                </video>
              </body>
            </html>
          `;

          $$('test_video').addEventListener( 'click', () => {
            if( VIDEO_BLOB ){
              if( VIDEO_URL ) URL.revokeObjectURL( VIDEO_URL );
              VIDEO_URL = URL.createObjectURL( VIDEO_BLOB );
              const _width = parseInt( $$('record_video_width').value );
              const _height = parseInt( $$('record_video_height').value );
              const xPosition = (screen.width/2) - _width/2;
              const yPosition = (screen.height/2) - _height/2;
              const _fps = parseFloat( $$('record_video_fps').value );
              const win = window.open( 
              VIDEO_URL, 
              "Title2",`
              toolbar=no,
              location=no,
              directories=no,
              status=no,
              menubar=no,
              scrollbars=no,
              resizable=no,
              width=${ _width },
              height=${ _height },
              top=${yPosition},
              left=${xPosition}
              `);
            }
          } );

          $$('get_result_gallery_mp4').addEventListener( 'click', (e) => {
            e.preventDefault();
            if( VIDEO_BLOB ){
              VIDEO_URL = URL.createObjectURL( VIDEO_BLOB );
              const a = e.target;
              a.href = VIDEO_URL;
              a.download = dateNow() + '_gallery.mp4';
              a.click();
              URL.revokeObjectURL(VIDEO_URL);
            }
          } );

          const scrollInspectorToFrame = ( i ) => {
            const _thumb = $$(`inspector_key_${i}`);
            if( _thumb ){
              _thumb.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
          };

          const changeThumbsSize = () => {
            const frames = FRAMES_BUFFER_ARRAY;
            const GG = $$('thumbs_list');
            const numColumns = $$('thubms_size_control').value;
            GG.style.gridTemplateColumns = `repeat(${numColumns}, 1fr)`;

            GG.innerHTML = "";
            $$('processed').innerText = `${frames.length} images loaded`;
            for( let i = 0; i < frames.length; i++ ){
              const filteredFrame = {
                t: TEXT_BUFFER_ARRAY[ i ],
                f: FRAMES_BUFFER_ARRAY[ i ],
              };
              const div_ = document.createElement('div');
              div_.addEventListener( 'click', () => {
                scrollInspectorToFrame( i );
              } );
              div_.title = filteredFrame.t.positive;
              
              const img = new Image();
              img.src = filteredFrame.f;

              div_.appendChild( img );
      
              const _favoriteBox = document.createElement('div');
              _favoriteBox.title = 'Mark as favorite';
              _favoriteBox.classList.add('editable_favorite');
              _favoriteBox.innerText =  '☆';
              if( TEXT_BUFFER_ARRAY[ i ].favorite ){
                _favoriteBox.classList.add('active');
                _favoriteBox.innerText =  '★';
              }
              _favoriteBox.addEventListener( 'click', ( e ) => { 
                e.stopPropagation();
                e.preventDefault();
                const nextFavoriteState = !TEXT_BUFFER_ARRAY[ i ].favorite;
                TEXT_BUFFER_ARRAY[ i ].favorite = nextFavoriteState;
                if( nextFavoriteState ){
                  _favoriteBox.classList.add('active');
                _favoriteBox.innerText =  '★';
                } else {
                  _favoriteBox.classList.remove('active');
                _favoriteBox.innerText =  '☆';
                }
              } );
              div_.appendChild( _favoriteBox );
              
              const _includeBox = document.createElement('div');
              _includeBox.title = 'Include in gallery';
              _includeBox.classList.add('editable_include');
              if( !TEXT_BUFFER_ARRAY[ i ].include ){
                  _includeBox.classList.add('excluded');
              }
              _includeBox.addEventListener( 'click', ( e ) => { 
                e.stopPropagation();
                e.preventDefault();
                const nextIncState = !TEXT_BUFFER_ARRAY[ i ].include;
                TEXT_BUFFER_ARRAY[ i ].include = nextIncState;
                if( nextIncState ){
                  _includeBox.classList.remove('excluded');
                } else {
                  _includeBox.classList.add('excluded');
                }
              } );
              div_.appendChild( _includeBox );

              GG.appendChild( div_ );
            } 
          };
          const getJSONfromFile = ( file, callback  ) => {
            if( !file ) { callback( null ); return false; }
            const fr = new FileReader();
            fr.onload = () => {
              let _json = null;
              try { _json = JSON.parse( fr.result ); } catch( err ){}
              if(!_json) { callback( null ); return false; }
              callback( _json );
            };
            fr.readAsText( file );
          };
          const getTextfromFile = ( file, callback  ) => {
            if( !file ) { callback( null ); return false; }
            const fr = new FileReader();
            fr.onload = () => {
              callback( fr.result );
            };
            fr.readAsText( file );
          };
          $$('concat_by_json').addEventListener( 'change', async ( e ) => {
            const file = $$('concat_by_json').files[0];            
            $$('concat_by_json').value = null;
            getJSONfromFile( file, ( _json ) => {              
              if(!_json){ return null; }
              for( const nextElement of _json ){
                FRAMES_BUFFER_ARRAY.push( nextElement.f );
                TEXT_BUFFER_ARRAY.push(  nextElement.t );
              }
              updateInspectorByFiles();
              changeThumbsSize();
            } );
          } );
          $$('replace_by_json').addEventListener( 'change', async ( e ) => {
            const file = $$('replace_by_json').files[0];            
            $$('replace_by_json').value = null;
            getJSONfromFile( file, ( _json ) => { 
              if(!_json){ return null; }             
              FRAMES_BUFFER_ARRAY = [];
              TEXT_BUFFER_ARRAY = [];
              for( const nextElement of _json ){
                FRAMES_BUFFER_ARRAY.push( nextElement.f );
                TEXT_BUFFER_ARRAY.push(  nextElement.t );
              }
              updateInspectorByFiles();
              changeThumbsSize();
            } );
          } );

          $$('extract_from_html').addEventListener( 'change', async ( e ) => {
            const file = $$('extract_from_html').files[0];            
            $$('extract_from_html').value = null;
            getTextfromFile( file, ( _html_string ) => { 
              if( !_html_string.includes('/*DATA_START*/') ){
                return false;
              }
              const asArray = _html_string.split('\n');
              let extracted_f = '';
              let extracted_t = '';
              let status = 'start';
              for( const nextString of asArray ){
                const ns = nextString.trim();
                if( ns.includes('/*DATA_END*/') ){
                   break;
                }
                if( status === 'start' ){ 
                  if( ns.includes('/*DATA_START*/') ){ status = 'none'; }
                  continue;
                }
                if( ns.includes( 'const f' ) ){ 
                  status = 'f';
                  continue;
                }
                if( ns.includes( 'const t' ) ){ 
                  status = 't';
                  continue;
                }
                if( (status === 'f' || status === 't') && ns.includes('];') ){ 
                  status = 'none';
                  continue;
                }
                if( status === 'f' ){ extracted_f += ns }
                if( status === 't' ){ extracted_t += ns }
              }
              if( extracted_f.length === 0 ){
                return false;
              }
              // console.log( { extracted_f, extracted_t } );
              extracted_f = JSON.parse(`[${ extracted_f }]`);
              extracted_t = JSON.parse(`[${ extracted_t }]`);
              // console.log( {
              //   extracted_f,
              //   extracted_t,
              // } )
              for( let i = 0; i < extracted_f.length; i++ ){
                let textOptions = {
                  positive: extracted_t[i].positive,
                  negative: extracted_t[i].negative,
                  config: extracted_t[i].config,
                  include: ( 'include' in extracted_t[i] ) ? extracted_t[i].include : true,
                  favorite: extracted_t[i].favorite || false,
                };
                FRAMES_BUFFER_ARRAY.push( extracted_f[ i ] );
                TEXT_BUFFER_ARRAY.push( textOptions );
              }
              updateInspectorByFiles();
              changeThumbsSize();
            } );
          } );

          $$('download_data_as_json').addEventListener( 'click', ( e ) => {
            e.preventDefault();
            const finallyData = [];
            for( let i = 0; i < FRAMES_BUFFER_ARRAY.length; i++ ){
              if( TEXT_BUFFER_ARRAY[i].include ){
                finallyData.push( {
                  f: FRAMES_BUFFER_ARRAY[i],
                  t: TEXT_BUFFER_ARRAY[i],
                } );
              }
            }
            const finallyData_string = JSON.stringify(finallyData, null, 2);
            alert( `
Finally data:
- Images: ${ finallyData.length }
- Size: ~${ parseInt( finallyData_string.length / 1000 ) }Kb
            ` );
            const galleryBlob = new Blob([ JSON.stringify(finallyData, null, 2) ], { type: "application/json" });
            _URL = URL.createObjectURL( galleryBlob );
            const a = $$("download_data_as_json");
            a.href = _URL;
            a.download = dateNow() + '_gallery.json';
            a.click();
            URL.revokeObjectURL( _URL );
          } );

          $$('download_images_zip').addEventListener( 'click', ( e ) => {
            const zip = new JSZip();
            const folders = {};
            let imgs_folder;
            if( !window.IMG_TO_CAT ){
              imgs_folder = zip.folder("images");
            }
            let i = 0;
            for( const nextFrame of FRAMES_BUFFER_ARRAY ){
              if( !window.IMG_TO_CAT ){
                if( TEXT_BUFFER_ARRAY[ i ].ext === 'webp' ){
                  imgs_folder.file( `${i}_img.webp`, nextFrame.replace('data:image/webp;base64,', '' ) , {base64: true} ); //
                } else if( TEXT_BUFFER_ARRAY[ i ].ext === 'gif' ){
                  imgs_folder.file( `${i}_img.gif`, nextFrame.replace('data:image/gif;base64,', '' ) , {base64: true} ); //
                } else {
                  imgs_folder.file( `${i}_img.jpg`, nextFrame.replace('data:image/jpeg;base64,', '' ) , {base64: true} ); //
                }
              } else {
                const positive = TEXT_BUFFER_ARRAY[ i ].positive;
                if( !folders[ positive ] ){
                  folders[ positive ] = zip.folder(positive);
                }
                // const folder = folders[ positive ];
                folders[ positive ].file( `${i}_img.jpg`, nextFrame.replace('data:image/jpeg;base64,', '' ) , {base64: true} ); //
              }
              i++;
            }
            zip.file( "data.json", JSON.stringify( TEXT_BUFFER_ARRAY, null, 2 ), { type: "application/json" });
            zip.generateAsync({type:"blob"}).then(function(content) {        
                const a = document.createElement('a');
                a.href = URL.createObjectURL( content );
                a.download = dateNow() + '_images_gallery.zip';
                a.click();
            });
          } );

          $$('specific_resize').addEventListener( 'change', () => {
              const isCheckedNow = !!$$('specific_resize').checked;
              SPECIFIC_RESIZE_ENABLED = isCheckedNow;
              if( SPECIFIC_RESIZE_ENABLED ){
                $$('specific_resize_container').classList.remove('hidden');
              } else {
                $$('specific_resize_container').classList.add('hidden');
              }
          } );

          $$('switch_include_all').addEventListener( 'click', () => {
            for( const nextT of TEXT_BUFFER_ARRAY ){
              nextT.include = true;
            }
              changeThumbsSize();
          } );

          $$('switch_exclude_all').addEventListener( 'click', () => {
            for( const nextT of TEXT_BUFFER_ARRAY ){
              nextT.include = false;
            }
              changeThumbsSize();
          } );

          $$('thubms_size_control').addEventListener( 'input', () => {
            changeThumbsSize();
          } );

          $$('js_for_evaluate').addEventListener( 'click', () => {

            let TEMP_FOO = PROMPT_PARSER_FOR_FOO;

            CUSTOM_POPUP.init({
              name: '',
              elements: [
                [ 
                  { 
                    type: 'textarea', 
                    attr: {
                      value: TEMP_FOO, 
                    },
                    style: { minHeight: '400px' },
                    events: {
                      input: ( modal, event ) => {
                          TEMP_FOO = event.target.value;
                      }  
                    }
                  } 
                ],
                [
                  { 
                    type: 'button',  
                    attr: {
                      innerText: 'apply', 
                    },
                    style: { backgroundColor: '#aaffaa' },
                    events: {
                      click: ( modal, event ) => {
                        const FOO = new Function( 'parsedImagePrompt', TEMP_FOO );
                        PROMPT_PARSER_FOR_FOO = TEMP_FOO;
                        PROMPT_PARSER_FOO = FOO
                      }  
                    }
                  },
                  { 
                    type: 'button',  
                    attr: {
                      innerText: 'disable parser usage', 
                    },
                    style: { backgroundColor: '#ffaaaa' },
                    events: {
                      click: ( modal, event ) => {
                        PROMPT_PARSER_FOO = null;
                      }  
                    }
                  },
                ],
              ],
            });
          });

        }
    </script>
  </body>
</html>
